<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="img/img.png">

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('PWA Registrado!'))
      .catch((err) => console.log('Erro no PWA:', err));
  }
</script>
</head>
<body>
    <div class="fundo">
        <div class="conteiner">
            <div class="tito">

            </div>
            <div class="infos">
                <input type="text" id="entrada" placeholder="o que quer fazer?">
                <button id="add" onclick="adicionar()">Adicionar</button>
            </div>

            <ul id="lista">

            </ul>
            <button id="limpar" onclick="limpar()">Limpar</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
